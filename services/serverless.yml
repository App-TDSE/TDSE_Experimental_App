service: twitter-microservices

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    POSTS_TABLE: ${self:custom.tableName}
  httpApi:
    cors: true
    authorizers:
      auth0Authorizer:
        identitySource: $request.header.Authorization
        issuerUrl: https://dev-osmyby26lkp0anye.us.auth0.com/
        audience:
          - https://twitter
  role: arn:aws:iam::973603710939:role/LabRole

custom:
  tableName: 'twitter-posts-table-${sls:stage}'

functions:
  # Stream Service — public endpoint, no auth required
  getStream:
    handler: handlers/getStream.getStream
    description: "Stream Service: returns the global public feed of all posts"
    events:
      - httpApi:
          path: /api/stream
          method: get

  # Posts Service — protected, JWT required
  createPost:
    handler: handlers/createPost.createPost
    description: "Posts Service: creates a new post (max 140 chars) for the authenticated user"
    events:
      - httpApi:
          path: /api/posts
          method: post
          authorizer:
            name: auth0Authorizer

  # User Service — protected, JWT required
  getUser:
    handler: handlers/getUser.getUser
    description: "User Service: returns the authenticated user's Auth0 JWT claims"
    events:
      - httpApi:
          path: /api/me
          method: get
          authorizer:
            name: auth0Authorizer


resources:
  Resources:
    PostsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TableName: ${self:custom.tableName}
