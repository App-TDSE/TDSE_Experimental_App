version: '3.8'

services:
  postgres-users:
    image: postgres:16-alpine
    container_name: tdse-postgres-users
    environment:
      POSTGRES_DB: tdse_users
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-posts:
    image: postgres:16-alpine
    container_name: tdse-postgres-posts
    environment:
      POSTGRES_DB: tdse_posts
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres-posts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile.dev
    container_name: tdse-user-service
    ports:
      - "8081:8080"
    environment:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-users:5432/tdse_users
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: rootpassword
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
    depends_on:
      postgres-users:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  posts-service:
    build:
      context: ./posts-service
      dockerfile: Dockerfile.dev
    container_name: tdse-posts-service
    ports:
      - "8082:8080"
    environment:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-posts:5432/tdse_posts
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: rootpassword
      USER_SERVICE_URL: http://user-service:8080
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
    depends_on:
      postgres-posts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  stream-service:
    build:
      context: ./stream-service
      dockerfile: Dockerfile.dev
    container_name: tdse-stream-service
    ports:
      - "8083:8080"
    environment:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      POSTS_SERVICE_URL: http://posts-service:8080
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
    depends_on:
      - posts-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-users-data:
  postgres-posts-data:
