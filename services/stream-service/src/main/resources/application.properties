spring.application.name=stream-service

auth0.domain=${AUTH0_DOMAIN}
auth0.audience=${AUTH0_AUDIENCE}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${AUTH0_DOMAIN}/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://${AUTH0_DOMAIN}/.well-known/jwks.json

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.oauth.client-id=${AUTH0_CLIENT_ID:}
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true

# Inter-service communication
app.services.posts-service-url=${POSTS_SERVICE_URL:http://localhost:8082}
