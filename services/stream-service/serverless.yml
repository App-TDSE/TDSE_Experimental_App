service: tdse-stream-service

frameworkVersion: '4'

provider:
  name: aws
  runtime: java21
  region: ${env:AWS_REGION, 'us-east-1'}
  role: arn:aws:iam::973603710939:role/LabRole
  environment:
    AUTH0_DOMAIN: ${env:AUTH0_DOMAIN}
    AUTH0_AUDIENCE: ${env:AUTH0_AUDIENCE}
    AUTH0_CLIENT_ID: ${env:AUTH0_CLIENT_ID}
    CORS_ALLOWED_ORIGINS: ${env:CORS_ALLOWED_ORIGINS}
    POSTS_SERVICE_URL: ${env:POSTS_SERVICE_URL}



package:
  artifact: target/stream-service-1.0.0.jar

functions:
  streamService:
    handler: org.eci.TdseApp.stream.StreamServiceLambdaHandler
    memorySize: 2048
    timeout: 29
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false
      - http:
          path: /
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false


