service: tdse-stream-service

frameworkVersion: '4'

provider:
  name: aws
  runtime: java21
  region: ${env:AWS_REGION, 'us-east-1'}
  environment:
    AUTH0_DOMAIN: ${env:AUTH0_DOMAIN}
    AUTH0_AUDIENCE: ${env:AUTH0_AUDIENCE}
    AUTH0_CLIENT_ID: ${env:AUTH0_CLIENT_ID}
    CORS_ALLOWED_ORIGINS: ${env:CORS_ALLOWED_ORIGINS}
    POSTS_SERVICE_URL: ${env:POSTS_SERVICE_URL}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

package:
  artifact: target/stream-service.jar

functions:
  streamService:
    handler: org.eci.TdseApp.stream.StreamServiceLambdaHandler
    memorySize: 512
    timeout: 30
    events:
      - http:
          path: /{proxy+}
          method: ANY
      - http:
          path: /
          method: ANY

plugins:
  - serverless-java-plugin
