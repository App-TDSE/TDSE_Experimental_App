spring.application.name=MicroserviciosLambda

# Auth0 Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-osmyby26lkp0anye.us.auth0.com/
auth0.audience=https://twitter

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:twitterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
