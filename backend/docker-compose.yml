services:
  tdseapp-backend:
    build: .
    container_name: tdse-backend
    ports:
      - "8080:8080"
    environment:
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/tdse_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JPA_SHOW_SQL=${JPA_SHOW_SQL:-false}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: tdse-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: tdse_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tdse_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - tdse_postgres_data:/var/lib/postgresql/data

volumes:
  tdse_postgres_data:
